name: Deploy Solus OS Hub to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Environment
        uses: actions/configure-pages@v5

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy Asset Payload to Production
        uses: actions/deploy-pages@v4
